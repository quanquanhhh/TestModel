<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" href="data:," />
  <title>IELTS Speaking Part 2</title>
  <style>
    :root {
      --bg: #fbfcf8;
      --text: #121614;
      --muted: #687169;
      --soft: #eef6e9;
      --accent: #237033;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --snap-duration: 480ms;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    body {
      user-select: none;
      -webkit-user-select: none;
      position: fixed;
      inset: 0;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: 520px;
      margin: 0 auto;
      overflow: hidden;
      background: radial-gradient(circle at 50% -10%, rgba(93,154,79,.08), transparent 38%), var(--bg);
    }

    .track {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      will-change: transform;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .track.anim {
      transition: transform var(--snap-duration) cubic-bezier(.2,.78,.24,1);
    }

    .card-page {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(var(--page-offset) * 100%);
      width: 100%;
      height: 100%;
      padding: calc(var(--safe-top) + 14px) 24px calc(var(--safe-bottom) + 18px);
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 50% -10%, rgba(93,154,79,.08), transparent 38%), var(--bg);
      overflow: hidden;
    }

    .topbar {
      height: 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      flex: 0 0 auto;
    }

    .top-title { font-size: 17px; font-weight: 700; letter-spacing: .1px; }
    .progress { color: var(--accent); font-weight: 700; font-size: 15px; }

    .meta-row {
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex: 0 0 auto;
    }

    .story-tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      max-width: 86%;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .question-title {
      margin-top: 18px;
      font-size: clamp(25px, 6.8vw, 34px);
      line-height: 1.1;
      font-weight: 780;
      letter-spacing: -.7px;
      flex: 0 0 auto;
    }

    .page-indicator {
      width: 48px;
      height: 5px;
      margin-top: 18px;
      margin-bottom: 17px;
      position: relative;
      flex: 0 0 auto;
    }

    .active-line {
      position: absolute;
      left: 0;
      top: 0;
      width: 22px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
      transform: translateX(0px);
      transition: transform .18s cubic-bezier(.2,.9,.2,1);
    }

    .card-page.mode-cue .active-line { transform: translateX(26px); }

    .content-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 2px;
      padding-bottom: 76px;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }

    .content-wrap::-webkit-scrollbar { display: none; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--accent);
      font-size: 18px;
      font-weight: 760;
      margin: 0 0 17px;
    }

    .section-icon {
      width: 21px;
      height: 21px;
      border: 2px solid currentColor;
      border-radius: 5px;
      display: inline-block;
      position: relative;
      flex: 0 0 auto;
    }

    .section-icon::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 6px;
      height: 2px;
      border-radius: 2px;
      background: currentColor;
      box-shadow: 0 5px 0 currentColor;
      opacity: .85;
    }

    .answer-text {
      font-size: 17px;
      line-height: 1.56;
      letter-spacing: .03px;
      white-space: pre-wrap;
    }

    .cue-list { list-style: none; margin: 0; padding: 0; }

    .cue-list li {
      position: relative;
      margin: 0 0 17px;
      padding: 18px 18px 18px 44px;
      border-radius: 19px;
      background: rgba(237,247,232,.82);
      color: var(--text);
      font-size: 18px;
      line-height: 1.35;
      font-weight: 620;
    }

    .cue-list li::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 27px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .keywords {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(237,247,232,.8);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .card-page.mode-answer .cue-only,
    .card-page.mode-cue .answer-only { display: none; }

    .translate-chip {
      position: absolute;
      right: 24px;
      bottom: calc(var(--safe-bottom) + 24px);
      z-index: 8;
      width: 46px;
      height: 38px;
      border-radius: 13px;
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,.78);
      color: var(--accent);
      font-size: 20px;
      font-weight: 800;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px rgba(16,60,20,.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card-page.mode-cue .translate-chip { display: none; }

    .translation-panel {
      position: absolute;
      z-index: 20;
      left: 16px;
      right: 16px;
      bottom: calc(var(--safe-bottom) + 14px);
      max-height: 58vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: rgba(255,255,255,.95);
      color: #101418;
      border-radius: 24px;
      padding: 18px 20px 22px;
      box-shadow: 0 24px 80px rgba(20,38,19,.22);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transform: translateY(calc(100% + 40px));
      opacity: 0;
      transition: transform .18s ease, opacity .18s ease;
    }

    .translation-panel.show { transform: translateY(0); opacity: 1; }

    .translation-title {
      font-size: 16px;
      font-weight: 760;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-translation {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      background: #eef6e9;
      color: #237033;
      font-size: 22px;
      line-height: 28px;
      padding: 0;
    }

    .translation-text {
      font-size: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .edge-hint {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(var(--safe-bottom) + 6px);
      text-align: center;
      font-size: 12px;
      color: rgba(35,112,51,.42);
      pointer-events: none;
      z-index: 12;
    }

    @media (hover: hover) and (pointer: fine) and (min-height: 780px) {
      body {
        display: grid;
        place-items: center;
      }

      .app {
        height: min(100vh, 760px);
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(25, 56, 30, .1);
      }
    }
  </style>
</head>

<body>
  <div id="app" class="app">
    <div id="track" class="track"></div>

    <aside class="translation-panel" id="translationPanel">
      <div class="translation-title">
        <span>中文翻译</span>
        <button class="close-translation" id="closeTranslation" type="button">×</button>
      </div>
      <div class="translation-text" id="translationText"></div>
    </aside>

    <div class="edge-hint" id="edgeHint"></div>
  </div>

  <script>
    const QUESTIONS = [
  {
    "id": 1,
    "topicCn": "克服困难成功的人",
    "title": "Describe a person who met difficulties but succeeded",
    "cuePoints": [
      "Who this person is",
      "What difficulties he met",
      "How he overcame the difficulties",
      "And explain how you feel about him"
    ],
    "story": "故事2",
    "storyConversion": "I would talk about Sam Altman and the 2023 OpenAI leadership crisis as a concrete difficulty he overcame.",
    "cnConversion": "讲 Sam Altman：具体讲 2023 年 OpenAI 领导层危机，他如何通过沟通和团队信任渡过困难。",
    "keywords": "leadership crisis\nstay calm\nclear communication\nbuild trust",
    "fullEnglish": "I would like to talk about Sam Altman, the co-founder and CEO of OpenAI. I knew about him because I started using ChatGPT for English learning and coding.\n\nOne big difficulty he met was the leadership crisis at OpenAI in 2023. I read that he suddenly left the CEO role, and the company was in a very uncertain situation. For a technology company, losing its leader can be a huge problem, because employees, users, and partners may all feel worried.\n\nHe overcame it by communicating with the team and partners. A few days later, he returned as CEO, and OpenAI also started to improve its board and management. After that, the company continued to develop ChatGPT and other AI tools.\n\nI admire him because he stayed calm in a very stressful time. From his story, I learned that when a serious problem happens, panic does not help. Clear communication and trust are much more important.",
    "fullChinese": "我想讲 Sam Altman，他是 OpenAI 的联合创始人兼 CEO。我是因为自己开始用 ChatGPT 学英语和解决编程问题，才了解他的。\n\n他遇到的一个很大的困难，是 OpenAI 在 2023 年的领导层危机。我看到报道说，他当时突然离开 CEO 职位，公司处在非常不确定的状态。对于一家科技公司来说，突然失去领导者会是很大的问题，因为员工、用户和合作伙伴都会感到担心。\n\n他是通过和团队、合作伙伴沟通来解决的。几天之后，他重新回到 CEO 职位，OpenAI 也开始改进董事会和管理方式。之后，公司继续发展 ChatGPT 和其他 AI 工具。\n\n我佩服他是因为他在压力很大的时候还能保持冷静。我从这件事学到，当严重问题发生时，慌乱没有用，清晰沟通和信任更重要。"
  },
  {
    "id": 2,
    "topicCn": "改变重要想法",
    "title": "Describe a time when you changed an important opinion of yours",
    "cuePoints": [
      "When you changed your opinion",
      "What the original opinion was",
      "Why you changed it",
      "And explain how you felt about the experience"
    ],
    "story": "故事2",
    "storyConversion": "Using ChatGPT changed my opinion about AI from a distant technology to a practical tool.",
    "cnConversion": "用 ChatGPT 改变了我对 AI 的看法：它不是遥远的高科技，而是普通人能用的学习工具。",
    "keywords": "change my view\npractical learning tool\nlearn faster",
    "fullEnglish": "One important opinion I changed was my view of AI. In the past, I thought advanced AI was mainly for scientists or big companies. I felt it was powerful, but far away from my daily life.\n\nThis changed about two years ago, when I began to use ChatGPT. At first, I only used it to check simple English sentences. Later, I used it to practise speaking, understand difficult grammar, and solve problems in my Unity projects.\n\nI changed my opinion because I found that AI could explain hard things in simple words. It did not replace my thinking, but it helped me learn faster and become more confident.\n\nI felt surprised but also excited. Now I see AI as a practical learning tool for ordinary people. This change is important to me because it affects both my work and my IELTS preparation.",
    "fullChinese": "我改变的一个重要想法，是我对 AI 的看法。以前我觉得高级 AI 主要是科学家或者大公司使用的东西。我觉得它很厉害，但离我的日常生活很远。\n\n大约两年前，这个想法开始改变，因为我开始使用 ChatGPT。一开始我只是用它检查简单英文句子。后来我用它练口语、理解难语法，也用它解决 Unity 项目里的问题。\n\n我改变想法是因为我发现 AI 可以用简单的话解释复杂内容。它没有代替我思考，但能帮助我学得更快，也更有信心。\n\n我当时很惊讶，也很兴奋。现在我把 AI 看成普通人也能使用的实用学习工具。这个改变对我很重要，因为它影响了我的工作和雅思准备。"
  },
  {
    "id": 3,
    "topicCn": "想颁布的环保法律",
    "title": "Describe an environmental law you would like your country to introduce",
    "cuePoints": [
      "What law it should be",
      "Why people should follow the law",
      "Whether the law will be popular",
      "And explain how you feel about this law"
    ],
    "story": "故事1",
    "storyConversion": "I would introduce a law to reduce single-use plastic after seeing rubbish during the Gansu trip.",
    "cnConversion": "环保法律：减少一次性塑料，原因来自甘肃植树时对环境的观察。",
    "keywords": "single-use plastic\nreusable bags\nsmall daily changes",
    "fullEnglish": "If I could introduce an environmental law, I would make a law to reduce single-use plastic products, especially in tourist places and natural areas.\n\nPeople should follow this law because plastic waste can stay in the environment for a long time. During my tree-planting trip in Gansu, I noticed that even small rubbish could make a natural place look worse. It made me think more seriously about daily habits.\n\nThe law would ask shops to charge for plastic bags and encourage people to use reusable bags and cups. At first, it might not be popular because some people may think it is inconvenient. But after some time, I think most people would get used to it.\n\nI would feel good about this law because it is simple and practical. It does not ask people to change everything, but it pushes them to make better choices every day.",
    "fullChinese": "如果我可以颁布一条环保法律，我会制定一条减少一次性塑料制品的法律，尤其是在旅游区和自然景区。\n\n人们应该遵守这条法律，因为塑料垃圾会在环境中停留很久。去甘肃参加植树活动时，我注意到即使是很小的垃圾，也会让自然环境看起来变差。这让我更认真地思考日常习惯。\n\n这条法律会要求商店对塑料袋收费，并鼓励人们使用可重复使用的袋子和杯子。一开始它可能不太受欢迎，因为有些人会觉得不方便。但过一段时间，我觉得大多数人会习惯。\n\n我会支持这条法律，因为它简单实用。它不是要求人们改变一切，而是推动大家每天做更好的选择。"
  },
  {
    "id": 4,
    "topicCn": "别人帮助解决问题",
    "title": "Describe a time when a person did something to help you solve a problem",
    "cuePoints": [
      "Who the person is",
      "What the problem was",
      "How he/she helped you",
      "And explain how you felt about the experience"
    ],
    "story": "故事1",
    "storyConversion": "My childhood friend Lulu helped me prepare for the Gansu volunteer trip when I did not know what to do.",
    "cnConversion": "璐璐帮我准备甘肃植树活动：报名、联系组织者、列清单。",
    "keywords": "childhood friend Lulu\npacking list\nsolve the problem step by step",
    "fullEnglish": "I want to talk about my childhood friend Lulu, who helped me solve a problem before my Gansu tree-planting trip.\n\nAt that time, I wanted to join the volunteer activity, but I did not know how to sign up or what to prepare. I was also worried because I am not very strong physically, and the work sounded tiring.\n\nLulu helped me in a very practical way. She checked the information online, contacted the organiser with me, and made a simple packing list. She reminded me to bring sunscreen, comfortable shoes, water, and some medicine. She also told me not to overthink it and just take the first step.\n\nBecause of her help, I felt much calmer. In the end, the trip went well. I was really thankful because she did not only give advice; she actually helped me solve the problem step by step.",
    "fullChinese": "我想讲我的发小璐璐，她在我去甘肃植树之前帮我解决了一个问题。\n\n当时我想参加这个志愿活动，但不知道怎么报名，也不知道要准备什么。我也有点担心，因为我的体力不是特别好，而植树听起来很累。\n\n璐璐用很实际的方式帮了我。她帮我在网上查信息，和我一起联系组织者，还做了一个简单的行李清单。她提醒我带防晒、舒服的鞋、水和一些药。她也告诉我不要想太多，先迈出第一步。\n\n因为她的帮助，我冷静了很多。最后这次旅行很顺利。我真的很感谢她，因为她不只是给建议，而是一步一步帮我解决了问题。"
  },
  {
    "id": 5,
    "topicCn": "包含动物的故事或书",
    "title": "Describe a story/book with animals in it",
    "cuePoints": [
      "What animals are in it",
      "What the story/book is about",
      "Why you read the story/book",
      "And explain what you think of this story/book"
    ],
    "story": "故事2",
    "storyConversion": "I used ChatGPT to read a simple English story about a lost turtle and beach rubbish.",
    "cnConversion": "用 ChatGPT 辅助读一个关于迷路小海龟和海滩垃圾的英文故事。",
    "keywords": "a lost turtle\nbeach rubbish\nsimple but meaningful",
    "fullEnglish": "I would like to talk about a short English story about a lost turtle. I found it when I was practising English reading, and I used ChatGPT to help me understand some sentences.\n\nThe animal in the story is a small sea turtle. It gets lost because there is too much rubbish on the beach, and it cannot find its way back to the sea. Later, a little girl and her father clean part of the beach and help the turtle return safely.\n\nI read this story because the language was not too difficult, and it was connected with environmental protection. I also liked it because it was simple but meaningful.\n\nI think it is a good story. It reminded me that human behaviour can affect animals, even when we do not notice it. It also gave me a good topic for English practice.",
    "fullChinese": "我想讲一个关于迷路小海龟的英文短故事。我是在练习英语阅读时看到的，并且用 ChatGPT 帮我理解了一些句子。\n\n故事里的动物是一只小海龟。它因为海滩上有太多垃圾而迷路，找不到回到大海的路。后来，一个小女孩和她的爸爸清理了一部分海滩，并帮助小海龟安全回到海里。\n\n我读这个故事是因为它的语言不太难，而且和环保有关。我也喜欢它，因为它简单但有意义。\n\n我觉得这是一个好故事。它提醒我，人类的行为会影响动物，哪怕我们平时没有注意到。而且它也给了我一个很好的英语练习话题。"
  },
  {
    "id": 6,
    "topicCn": "喜欢拜访但不想住的家",
    "title": "Describe a home that you like to visit but do not want to live in",
    "cuePoints": [
      "Where it is",
      "What it is like",
      "Why you like to visit it",
      "And explain why you would not like to live there"
    ],
    "story": "故事1",
    "storyConversion": "A small farmhouse-style guesthouse near the Gansu tree-planting area was nice to visit but not suitable to live in.",
    "cnConversion": "甘肃植树区域附近的农家民宿，适合短住体验，不适合长期生活。",
    "keywords": "farmhouse-style guesthouse\nquiet yard\nbasic but relaxing",
    "fullEnglish": "A home I liked visiting but would not want to live in was a small farmhouse-style guesthouse near the tree-planting area in Gansu.\n\nIt was not fancy, but it had a small yard, some plants, and a very quiet atmosphere. I liked visiting it because it felt completely different from my city life. In the evening, we could sit in the yard, talk with other volunteers, and look at the sky. It was simple but relaxing.\n\nHowever, I would not want to live there for a long time. The location was far from the city, and it was not very convenient to buy things or use fast internet. The room was also a little dry and basic.\n\nSo I enjoyed it as a short visit, but I think I am still more suitable for city life.",
    "fullChinese": "一个我喜欢拜访但不想长期居住的家，是甘肃植树区域附近的一个农家风格民宿。\n\n它并不豪华，但有一个小院子、一些植物，氛围非常安静。我喜欢拜访那里，是因为它和我的城市生活完全不同。晚上我们可以坐在院子里，和其他志愿者聊天，看天空。它很简单，但让人放松。\n\n不过，我不想长期住在那里。那个地方离城市比较远，买东西不方便，网络也不是很好。房间也有点干燥，条件比较基础。\n\n所以我很享受短期拜访，但我觉得自己还是更适合城市生活。"
  },
  {
    "id": 7,
    "topicCn": "推荐旅行过的地方",
    "title": "Describe a place you have travelled to that you would like to recommend to others",
    "cuePoints": [
      "What it is",
      "Where it is",
      "What you saw and did there",
      "And explain why you would like to recommend it to others"
    ],
    "story": "故事1",
    "storyConversion": "I would recommend Gansu because I joined a tree-planting activity and learned something meaningful there.",
    "cnConversion": "推荐甘肃：不只是旅游，还能通过植树活动获得有意义的体验。",
    "keywords": "meaningful trip\nmore than sightseeing\nsmall actions",

    const app = document.getElementById('app');
    const track = document.getElementById('track');
    const translationPanel = document.getElementById('translationPanel');
    const translationText = document.getElementById('translationText');
    const closeTranslation = document.getElementById('closeTranslation');
    const edgeHint = document.getElementById('edgeHint');

    let index = Number(localStorage.getItem('ielts_part2_index') || 0);
    if (!Number.isFinite(index) || index < 0 || index >= QUESTIONS.length) index = 0;

    let mode = 'answer';
    let viewH = 0;
    let dragY = 0;
    let translationOpen = false;
    let isSnapping = false;
    let snapTarget = index;
    let snapTimer = 0;
    let snapEndHandler = null;
    let paintFrame = 0;
    let pendingTrackY = 0;

    function storyName(q) {
      if (q.story === '故事1') return '故事1 · 甘肃植树';
      if (q.story === '故事2') return '故事2 · ChatGPT / OpenAI';
      return q.story || '特殊题';
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[ch]));
    }

    function pageHTML(q, i, offset) {
      const points = Array.isArray(q.cuePoints) && q.cuePoints.length ? q.cuePoints : ['No cue card found for this question.'];
      return `
        <article class="card-page mode-answer" data-page="${i}" style="--page-offset:${offset}">
          <header class="topbar">
            <div class="top-title">IELTS Speaking Part 2</div>
            <div class="progress">${i + 1}/${QUESTIONS.length}</div>
          </header>

          <div class="meta-row">
            <div class="story-tag">${esc(storyName(q))}</div>
          </div>

          <div class="question-title">${esc(q.title || q.topicCn || '')}</div>

          <div class="page-indicator" aria-hidden="true">
            <div class="active-line"></div>
          </div>

          <section class="content-wrap">
            <div class="answer-only">
              <h2 class="section-title"><span class="section-icon"></span><span>Full Answer</span></h2>
              <div class="answer-text">${esc(q.fullEnglish || '')}</div>
              ${q.keywords ? `<div class="keywords">辅助记忆：\n${esc(q.keywords)}</div>` : ''}
            </div>

            <div class="cue-only">
              <h2 class="section-title"><span class="section-icon"></span><span>You should say:</span></h2>
              <ul class="cue-list">${points.map(p => `<li>${esc(p)}</li>`).join('')}</ul>
            </div>
          </section>

          <div class="translate-chip">中</div>
        </article>
      `;
    }

    function buildPages() {
      const first = Math.max(0, index - 1);
      const last = Math.min(QUESTIONS.length - 1, index + 1);
      const pages = [];

      for (let i = first; i <= last; i += 1) {
        pages.push(pageHTML(QUESTIONS[i], i, i - index));
      }

      track.innerHTML = pages.join('');
    }

    track.addEventListener('click', (e) => {
      const chip = e.target.closest('.translate-chip');
      if (!chip) return;

      e.stopPropagation();
      const page = chip.closest('.card-page');
      if (!page || Number(page.dataset.page) !== index || mode !== 'answer') return;
      translationOpen ? hideTranslation() : showTranslation();
    });

    function currentPage() {
      return track.querySelector(`.card-page[data-page="${index}"]`);
    }

    function currentContent() {
      const p = currentPage();
      return p ? p.querySelector('.content-wrap') : null;
    }

    function updateModeClasses() {
      track.querySelectorAll('.card-page').forEach(p => {
        if (Number(p.dataset.page) === index) {
          p.classList.toggle('mode-answer', mode === 'answer');
          p.classList.toggle('mode-cue', mode === 'cue');
        } else {
          p.classList.add('mode-answer');
          p.classList.remove('mode-cue');
        }
      });
    }

    function updateTranslationText() {
      translationText.textContent = QUESTIONS[index].fullChinese || '';
    }

    function trackYFor(pageIndex = index, extraY = 0) {
      viewH = app.clientHeight || window.innerHeight;
      return -(pageIndex - index) * viewH + extraY;
    }

    function setTrackY(y, animated = false, duration = 480) {
      track.style.setProperty('--snap-duration', duration + 'ms');
      track.classList.toggle('anim', animated);
      track.style.transform = `translate3d(0, ${y}px, 0)`;
    }

    function paintTrackY(y) {
      pendingTrackY = y;
      if (paintFrame) return;

      paintFrame = requestAnimationFrame(() => {
        paintFrame = 0;
        setTrackY(pendingTrackY, false, 0);
      });
    }

    function flushTrackPaint() {
      if (!paintFrame) return;
      cancelAnimationFrame(paintFrame);
      paintFrame = 0;
      setTrackY(pendingTrackY, false, 0);
    }

    function positionNow(animated = false) {
      dragY = 0;
      updateModeClasses();
      updateTranslationText();
      setTrackY(trackYFor(index), animated, animated ? 420 : 0);
      localStorage.setItem('ielts_part2_index', String(index));
    }

    function setMode(nextMode) {
      if (mode === nextMode) return;
      mode = nextMode;
      const c = currentContent();
      if (c) c.scrollTop = 0;
      hideTranslation();
      updateModeClasses();
    }

    function showTranslation() {
      translationOpen = true;
      translationPanel.classList.add('show');
    }

    function hideTranslation() {
      translationOpen = false;
      translationPanel.classList.remove('show');
    }

    closeTranslation.addEventListener('click', hideTranslation);

    function scrollBoundary() {
      const c = currentContent();
      if (!c) return { atTop: true, atBottom: true };
      return {
        atTop: c.scrollTop <= 2,
        atBottom: c.scrollTop + c.clientHeight >= c.scrollHeight - 2
      };
    }

    function canPageDirect(dy) {
      if (dy > 0 && index > 0) return true;
      if (dy < 0 && index < QUESTIONS.length - 1) return true;
      return false;
    }

    function clearSnapWait() {
      window.clearTimeout(snapTimer);
      snapTimer = 0;

      if (snapEndHandler) {
        track.removeEventListener('transitionend', snapEndHandler);
        snapEndHandler = null;
      }
    }

    function finishSnap() {
      if (!isSnapping) return;

      clearSnapWait();
      track.classList.remove('anim');
      index = snapTarget;
      mode = 'answer';
      dragY = 0;
      isSnapping = false;
      buildPages();
      updateModeClasses();
      updateTranslationText();
      setTrackY(0, false, 0);
      localStorage.setItem('ielts_part2_index', String(index));

      const c = currentContent();
      if (c) c.scrollTop = 0;
    }

    function animateTrackTo(y, duration, onFinish) {
      clearSnapWait();
      flushTrackPaint();
      isSnapping = true;

      snapEndHandler = (event) => {
        if (event.target !== track || event.propertyName !== 'transform') return;
        clearSnapWait();
        onFinish();
      };

      track.addEventListener('transitionend', snapEndHandler);
      snapTimer = window.setTimeout(() => {
        clearSnapWait();
        onFinish();
      }, duration + 100);

      setTrackY(y, true, duration);
    }

    function completeSnapForNewGesture() {
      if (!isSnapping) return;
      if (snapTarget === index) {
        clearSnapWait();
        track.classList.remove('anim');
        dragY = 0;
        isSnapping = false;
        setTrackY(0, false, 0);
        return;
      }
      finishSnap();
    }

    function snapBack(duration = 230) {
      snapTarget = index;
      animateTrackTo(0, duration, () => {
        track.classList.remove('anim');
        dragY = 0;
        setTrackY(0, false, 0);
        isSnapping = false;
      });
    }

    function snapTo(targetIndex, duration = 300) {
      const nextIndex = Math.max(0, Math.min(QUESTIONS.length - 1, targetIndex));

      if (nextIndex === index) {
        snapBack();
        return;
      }

      hideTranslation();
      snapTarget = nextIndex;
      animateTrackTo(trackYFor(nextIndex), duration, finishSnap);
    }

    let startX = 0, startY = 0, lastX = 0, lastY = 0, dragStartY = 0, startTime = 0;
    let axis = null;
    let startedInContent = false;
    let startBoundary = { atTop: true, atBottom: true };
    let activeV = false;
    let activeH = false;
    let gestureActive = false;
    let pageDirection = 0;
    let velocitySamples = [];
    let wheelIntent = 0;
    let wheelResetTimer = 0;
    let wheelLockUntil = 0;

    function addVelocitySample(y) {
      const now = performance.now();
      velocitySamples.push({ y, time: now });
      while (velocitySamples.length > 2 && now - velocitySamples[0].time > 100) {
        velocitySamples.shift();
      }
    }

    function recentVerticalVelocity() {
      if (velocitySamples.length < 2) return 0;
      const first = velocitySamples[0];
      const last = velocitySamples[velocitySamples.length - 1];
      return (last.y - first.y) / Math.max(1, last.time - first.time);
    }

    function resetGesture() {
      dragY = 0;
      axis = null;
      activeV = false;
      activeH = false;
      gestureActive = false;
      pageDirection = 0;
      velocitySamples = [];
      window.setTimeout(() => edgeHint.textContent = '', 500);
    }

    app.addEventListener('touchstart', e => {
      if (translationOpen || e.touches.length !== 1) return;

      completeSnapForNewGesture();
      const t = e.touches[0];
      startX = lastX = t.clientX;
      startY = lastY = t.clientY;
      dragStartY = startY;
      startTime = Date.now();
      axis = null;
      startedInContent = !!e.target.closest('.content-wrap');
      startBoundary = scrollBoundary();
      activeV = false;
      activeH = false;
      gestureActive = true;
      pageDirection = 0;
      dragY = 0;
      velocitySamples = [];
      addVelocitySample(startY);
      edgeHint.textContent = '';
      track.classList.remove('anim');
      setTrackY(0, false, 0);
    }, { passive: true });

    app.addEventListener('touchmove', e => {
      if (translationOpen || !gestureActive || e.touches.length !== 1) return;
      const t = e.touches[0];
      lastX = t.clientX;
      lastY = t.clientY;

      const dx = lastX - startX;
      const dy = lastY - startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (!axis && (absX > 8 || absY > 8)) {
        axis = absX > absY * 1.08 ? 'x' : 'y';
      }

      if (axis === 'x') {
        activeH = true;
        if (absX > 10) e.preventDefault();
        return;
      }

      if (axis === 'y') {
        if (!activeV) {
          const elapsed = Math.max(1, Date.now() - startTime);
          const isQuickFlick = Math.abs(dy) > 18 && Math.abs(dy) / elapsed > 0.85;
          const canPageAtBoundary = (dy > 0 && startBoundary.atTop && index > 0)
            || (dy < 0 && startBoundary.atBottom && index < QUESTIONS.length - 1);
          const can = startedInContent
            ? (canPageAtBoundary || (isQuickFlick && canPageDirect(dy)))
            : canPageDirect(dy);

          if (can) {
            activeV = true;
            pageDirection = dy < 0 ? 1 : -1;
            dragStartY = startY;
            dragY = dy;
            velocitySamples = [];
            addVelocitySample(startY);
            addVelocitySample(lastY);
            track.classList.remove('anim');
          } else {
            if (!startedInContent) {
              const blocked = (dy > 0 && index === 0) || (dy < 0 && index === QUESTIONS.length - 1);
              if (blocked) edgeHint.textContent = dy > 0 ? '已经是第一题' : '已经是最后一题';
            }
            // 慢拖用于阅读正文；一旦正文接管，就不在中途突然切换为翻页。
            axis = 'scroll';
            return;
          }
        }

        if (activeV) {
          e.preventDefault();
          const rawDragY = lastY - dragStartY;
          const reversed = (pageDirection > 0 && rawDragY > 0)
            || (pageDirection < 0 && rawDragY < 0);
          dragY = reversed ? rawDragY * 0.18 : rawDragY;
          addVelocitySample(lastY);
          paintTrackY(dragY);
        }
      }
    }, { passive: false });

    app.addEventListener('touchend', () => {
      if (translationOpen || !gestureActive) return;

      const dx = lastX - startX;
      const activeDy = activeV ? dragY : lastY - dragStartY;
      const dt = Math.max(1, Date.now() - startTime);
      const vx = dx / dt;
      const vy = recentVerticalVelocity();

      if (activeV) {
        flushTrackPaint();
        const projectedDy = activeDy + vy * 140;
        const passDistance = Math.abs(activeDy) > Math.min(112, viewH * 0.15);
        const passVelocity = Math.abs(projectedDy) > Math.min(92, viewH * 0.12)
          && Math.abs(activeDy) > 24;
        let target = index;

        if ((passDistance || passVelocity) && pageDirection > 0 && activeDy < 0) target = index + 1;
        if ((passDistance || passVelocity) && pageDirection < 0 && activeDy > 0) target = index - 1;

        if (target === index) {
          snapBack();
        } else {
          const remaining = Math.max(0, viewH - Math.abs(activeDy));
          const speed = Math.max(1.6, Math.abs(vy));
          const duration = Math.max(180, Math.min(320, Math.round(remaining / speed)));
          snapTo(target, duration);

        if (Math.abs(dx) > 68 || Math.abs(vx) > 0.62) {
          if (dx < 0) setMode('cue');       // 手向左滑：提示卡片
          else if (dx > 0) setMode('answer'); // 手向右滑：Full Answer
        }
      }

      resetGesture();
    }, { passive: true });

    app.addEventListener('touchcancel', () => {
      if (!gestureActive) return;
      if (activeV) {
        flushTrackPaint();
        snapBack(180);
      }
      resetGesture();
    }, { passive: true });

      if (translationOpen || Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;

      const now = performance.now();
      if (isSnapping || now < wheelLockUntil) {
        e.preventDefault();
        wheelLockUntil = now + 180;
        return;
      }

      const direction = Math.sign(e.deltaY);
      const isMouseWheel = e.deltaMode !== WheelEvent.DOM_DELTA_PIXEL || Math.abs(e.deltaY) >= 50;

      // 普通鼠标滚轮按“一格一页”处理，避免先滚到正文底部再出现大段留白。
      if (isMouseWheel) {
        const target = index + direction;
        if (target < 0 || target >= QUESTIONS.length) return;

        e.preventDefault();
        wheelIntent = 0;
        wheelLockUntil = now + 180;
        snapTo(target, 260);
        return;
      }

      // 触控板的小幅连续滚动保留正文阅读能力，到边界后再翻页。
      const boundary = scrollBoundary();
      const canMove = direction > 0
        ? boundary.atBottom && index < QUESTIONS.length - 1
        : boundary.atTop && index > 0;

      if (!canMove) {
        wheelIntent = 0;
        return;
      }

      e.preventDefault();
      wheelIntent += e.deltaY;
      window.clearTimeout(wheelResetTimer);
      wheelResetTimer = window.setTimeout(() => {
        wheelIntent = 0;
      }, 160);

      if (Math.abs(wheelIntent) < 42) return;

      const target = index + Math.sign(wheelIntent);
      wheelIntent = 0;
      wheelLockUntil = now + 180;
      snapTo(target, 260);
    }, { passive: false });

    window.addEventListener('resize', () => {
      viewH = app.clientHeight || window.innerHeight;
      if (isSnapping) completeSnapForNewGesture();
      else if (!activeV) setTrackY(0, false, 0);
    });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' && index < QUESTIONS.length - 1) snapTo(index + 1);
      if (e.key === 'ArrowUp' && index > 0) snapTo(index - 1);
      if (e.key === 'ArrowRight') setMode('answer');
      if (e.key === 'ArrowLeft') setMode('cue');
      if (e.key === 'Escape') hideTranslation();
    });

    buildPages();
    positionNow(false);
  </script>
</body>
</html>
